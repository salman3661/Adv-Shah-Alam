<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — Adv. Shah Alam</title>
  <style>
    /* ── Loading screen shown before Decap CMS boots ───────────── */
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    #cms-loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      background: linear-gradient(135deg, #0b1220 0%, #0f1b2d 100%);
    }
    #cms-loading .logo {
      font-size: 2rem; font-weight: 800; letter-spacing: -1px;
      background: linear-gradient(135deg, #c6a75e, #f0d080);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #cms-loading .sub { font-size: 0.85rem; color: #64748b; }
    #cms-loading .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid rgba(198,167,94,0.15);
      border-top-color: #c6a75e;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <div id="cms-loading">
    <div class="logo">⚖️ Admin Panel</div>
    <div class="sub">Advocate Md. Shah Alam — Content Dashboard</div>
    <div class="spinner"></div>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Hide loading screen once CMS is mounted
    window.addEventListener('load', () => {
      setTimeout(() => {
        const el = document.getElementById('cms-loading');
        if (el) el.style.display = 'none';
      }, 800);
    });
  </script>
</body>
</html>

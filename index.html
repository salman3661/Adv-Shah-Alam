  <!-- Anti-FOUC: set theme on body+html BEFORE React renders — zero flash -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored ? stored === 'dark' : systemDark;
        var theme = isDark ? 'dark' : 'light';

        // Kill transitions for first paint only
        document.documentElement.classList.add('no-theme-transition');

        // Apply to both elements — must match what ThemeContext does
        document.documentElement.setAttribute('data-theme', theme);
        document.body.setAttribute('data-theme', theme);
        if (isDark) document.documentElement.classList.add('dark');

        // Re-enable transitions after the first frame
        requestAnimationFrame(function () {
          document.documentElement.classList.remove('no-theme-transition');
        });
      } catch (e) { }
    })();
  </script>
